name: "Geräteverwaltung"
description: "Smart Home Device Inventory Management - Offline-First PWA"
version: "2.0.1"
slug: "geraeteverwaltung"
url: "https://github.com/DerRegner-DE/ha-device-inventory"
arch:
  - amd64
image: "ghcr.io/derregner-de/ha-device-inventory"
homeassistant_api: true
ingress: true
ingress_port: 3001
ingress_stream: true
panel_icon: "mdi:devices"
panel_title: "Geräteverwaltung"
map:
  - addon_config:rw
  - media:rw
options:
  language: "de"
  license_key: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
schema:
  language: "str"
  license_key: "str?"
  mqtt_host: "str?"
  mqtt_port: "int?"
  mqtt_user: "str?"
  mqtt_password: "str?"
startup: "application"
init: false
