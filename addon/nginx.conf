server {
    listen 3001 default_server;

    # ---- General settings ----
    client_max_body_size 50M;
    proxy_read_timeout 300;
    proxy_connect_timeout 10;

    # ---- Gzip compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        image/svg+xml;

    # ---- API: proxy to FastAPI backend ----
    location /api/ {
        proxy_pass http://127.0.0.1:3002/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass HA Ingress headers to backend
        proxy_set_header X-Ingress-Path $http_x_ingress_path;

        # WebSocket support (if needed later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---- Photos: serve from persistent storage ----
    location /photos/ {
        alias /data/photos/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Static frontend files ----
    location / {
        root /app/frontend;

        # Cache hashed static assets aggressively (filename changes on update)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # manifest.json + service-worker-like files identify the PWA — never cache
        # so users on a second browser pick up app changes immediately.
        location = /manifest.json {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            try_files $uri =404;
        }

        # SPA: deliver index.html with no-cache headers for ANY route.
        # The `try_files` here covers both `/` and SPA sub-routes (`/devices/abc`)
        # because index.html is the fallback. The named location below ensures
        # the no-cache header is applied regardless of the request URI.
        try_files $uri $uri/ @spa_fallback;
    }

    # SPA fallback with strict no-cache headers.
    # IMPORTANT: this must apply to every URI that resolves to index.html,
    # otherwise a stale index.html cached by the browser/proxy will keep
    # referencing old hashed bundles after an add-on update — users see no
    # changes on a second browser even though the version label updated.
    location @spa_fallback {
        root /app/frontend;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }
}
