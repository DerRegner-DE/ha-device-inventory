server {
    listen 3001;
    server_name _;

    # Frontend static files
    root /opt/geraeteverwaltung/frontend/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # API proxy to FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for large uploads
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50M;
    }

    # Serve photos directly from disk
    location /photos/ {
        alias /opt/geraeteverwaltung/backend/photos/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Cache hashed static assets aggressively (filename changes on update)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # manifest.json: small but identifies the PWA — never cache so users
    # on a second browser pick up app changes immediately.
    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # SPA fallback: any non-file route -> index.html with strict no-cache.
    # Without these headers the browser/proxy can keep an old index.html
    # that still references old hashed bundles, so updates appear "missing"
    # on a second browser even though the version label updated.
    location / {
        try_files $uri $uri/ @spa_fallback;
    }

    location @spa_fallback {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }
}
